name: Deploy to GitHub Pages

# Publishes the site (repo root, served as-is) to GitHub Pages.
# This site is plain static files — JSX is transpiled in the browser by
# Babel standalone at runtime, so there is no build step.

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "." # the whole repo root is the site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
